packages:
  - "playground"
  - "npm/*"
  - "!npm/vscode-art"
  - "!npm/vscode-vize"
  - "npm/vite-plugin-vize/example"
  - "npm/rspack-vize-plugin/example"
  - "npm/fresco/examples/*"
  - "examples/vite-musea"
  - "examples/oxlint-vize"
  - "docs"
  - "tests"
  - "bench"

catalogs:
  # Shared repo and file-system utilities.
  repo-tooling:
    "@iarna/toml": "2.2.5"
    "@pkl-community/pkl": "0.27.2"
    glob: "13.0.6"
    json-schema-to-typescript: "15.0.4"
    prettier: "3.8.3"
    tinyglobby: "0.2.16"

  # TypeScript toolchain shared across workspace packages.
  typescript:
    "@types/node": "25.7.0"
    "@typescript/native-preview": "7.0.0-dev.20260514.1"
    tsx: "4.21.0"
    typescript: "6.0.3"
    vue-tsc: "3.2.9"

  # Vite / Vite Plus stack and adjacent build-time plugins.
  vite-stack:
    vite: "npm:@voidzero-dev/vite-plus-core@0.1.21"
    vitest: "npm:@voidzero-dev/vite-plus-test@0.1.21"
    vite-plus: "0.1.21"
    tsdown: "0.22.0"
    "@vitejs/plugin-vue": "6.0.6"
    vite-node: "6.0.0"
    vite-plugin-inspect: "11.3.3"
    unplugin: "3.0.0"

  # Stable Vue ecosystem packages used by shipping examples and integrations.
  vue-stable:
    vue: "3.5.34"
    "@vue/runtime-core": "3.5.34"
    "@vue/test-utils": "2.4.10"
    vue-router: "4.5.1"

  # Vue beta track used by the playground and benchmark harnesses.
  vue-beta:
    vue: "3.6.0-beta.10"
    "@vue/compiler-sfc": "3.6.0-beta.10"
    "@vue/compiler-vapor": "3.6.0-beta.10"

  # Test runners and browser automation.
  testing:
    "@playwright/test": "1.60.0"
    playwright: "1.60.0"

  # Lint and formatting toolchain.
  linting:
    oxfmt: "0.49.0"
    oxlint: "1.64.0"
    "@oxlint/plugins": "1.64.0"

  # Bundlers beyond the Vite stack.
  bundlers:
    "@rspack/cli": "2.0.3"
    "@rspack/core": "2.0.3"
    esbuild: "0.28.0"
    rollup: "4.60.3"
    webpack: "5.106.2"

  # External framework integrations and native build helpers.
  integrations:
    "@modelcontextprotocol/sdk": "1.29.0"
    "@napi-rs/cli": "3.6.2"
    "@nuxt/kit": "4.4.5"
    "@ox-content/vite-plugin": "2.5.0"

  # Rendering / content tooling used by docs, playgrounds, and galleries.
  content:
    "@mdi/js": "7.4.47"
    "@tsdown/css": "0.22.0"
    "@types/pngjs": "6.0.5"
    highlight.js: "11.11.1"
    marked: "18.0.3"
    marked-highlight: "2.2.4"
    monaco-editor: "0.55.1"
    pngjs: "7.0.0"
    shiki: "4.0.2"
    three: "0.184.0"

  # JS-side OXC transform bridge.
  oxc:
    oxc-transform: "0.130.0"

  # Published native binary packages that are installed optionally at runtime.
  native-binaries:
    "@vizejs/native-darwin-arm64": "0.106.0"
    "@vizejs/native-darwin-x64": "0.106.0"
    "@vizejs/native-linux-arm64-gnu": "0.106.0"
    "@vizejs/native-linux-arm64-musl": "0.106.0"
    "@vizejs/native-linux-x64-gnu": "0.106.0"
    "@vizejs/native-linux-x64-musl": "0.106.0"
    "@vizejs/native-win32-arm64-msvc": "0.106.0"
    "@vizejs/native-win32-x64-msvc": "0.106.0"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
