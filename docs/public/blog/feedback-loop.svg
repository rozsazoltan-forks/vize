<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 420">
  <title id="title">Analysis feedback loop</title>
  <desc id="desc">A deterministic loop connects source files, native analysis, snapshots, actions, and community feedback.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6257" />
    </marker>
    <style>
      .bg { fill: #f8f6f0; }
      .node { fill: #ffffff; stroke: #d8d0c6; stroke-width: 1.5; }
      .green { fill: #e7f1ea; stroke: #698d73; stroke-width: 1.5; }
      .blue { fill: #edf1f8; stroke: #6f7e98; stroke-width: 1.5; }
      .rose { fill: #f6ecee; stroke: #a27681; stroke-width: 1.5; }
      .text { fill: #24211d; font: 600 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #655d55; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #5e665f; font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 0.06em; }
      .line { fill: none; stroke: #4f6257; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="960" height="420" />
  <text x="56" y="58" class="mono">DETERMINISTIC FEEDBACK</text>
  <text x="56" y="88" class="text">Fast checks make review loops smaller</text>

  <rect x="76" y="170" width="164" height="78" rx="6" class="node" />
  <text x="116" y="206" class="text">Source</text>
  <text x="110" y="230" class="small">real Vue projects</text>

  <rect x="304" y="142" width="190" height="134" rx="8" class="green" />
  <text x="352" y="188" class="text">Analyze</text>
  <text x="338" y="214" class="small">native Rust paths</text>
  <text x="338" y="238" class="small">stable source maps</text>

  <rect x="562" y="106" width="170" height="74" rx="6" class="blue" />
  <text x="602" y="149" class="text">Snapshot</text>

  <rect x="562" y="238" width="170" height="74" rx="6" class="rose" />
  <text x="610" y="281" class="text">Action</text>

  <rect x="790" y="170" width="118" height="78" rx="6" class="node" />
  <text x="820" y="206" class="text">Ship</text>
  <text x="815" y="230" class="small">with trust</text>

  <path d="M 240 209 L 294 209" class="line" />
  <path d="M 494 186 C 522 160 530 146 552 143" class="line" />
  <path d="M 494 232 C 522 256 530 274 552 275" class="line" />
  <path d="M 732 143 C 790 145 818 157 844 164" class="line" />
  <path d="M 732 275 C 790 272 818 258 844 252" class="line" />
  <path d="M 850 248 C 826 350 220 354 160 254" class="line" />
</svg>
