name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_INCREMENTAL: 0
  NPM_TAG: ${{ contains(github.ref_name, '-alpha') && 'alpha' || contains(github.ref_name, '-beta') && 'beta' || contains(github.ref_name, '-rc') && 'rc' || 'latest' }}

jobs:
  # Build CLI binaries for all platforms
  build-cli:
    name: Build CLI - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            archive: vize-x86_64-apple-darwin.tar.gz
          - host: macos-latest
            target: aarch64-apple-darwin
            archive: vize-aarch64-apple-darwin.tar.gz
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            archive: vize-x86_64-pc-windows-msvc.zip
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            archive: vize-aarch64-pc-windows-msvc.zip
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: vize-x86_64-unknown-linux-gnu.tar.gz
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: vize-aarch64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-cli-${{ matrix.settings.target }}
          cache-workspace-crates: "true"

      - name: Build CLI
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p vize --target ${{ matrix.settings.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.settings.target }}/release
          tar -czvf ../../../${{ matrix.settings.archive }} vize

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.settings.target }}/release
          7z a ../../../${{ matrix.settings.archive }} vize.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.settings.target }}
          path: ${{ matrix.settings.archive }}
          if-no-files-found: error
          compression-level: 0

  # Package editor extensions for GitHub Releases and registry validation
  build-editor-extensions:
    name: Build Editor Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: vp install --workspace-root --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tools
          cache-workspace-crates: "true"

      - name: Package VS Code extension
        run: vp run --workspace-root package:vscode-extension

      - name: Check Zed extension
        run: vp run --workspace-root check:zed-extension

      - name: Package Zed extension source
        run: vp run --workspace-root package:zed-extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: editor-extensions
          path: |
            npm/vscode-vize/dist/vize.vsix
            zed-vize-extension.tar.gz
          if-no-files-found: error
          compression-level: 0

  # Publish VS Code extension when VSCE_PAT is configured
  release-vscode-extension:
    name: Release VS Code extension
    runs-on: ubuntu-latest
    needs: build-editor-extensions
    environment: vscode-marketplace
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.14.0"
          run-install: false

      - name: Cache pnpm store for VS Code extension tooling
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-vscode-release-24.14.0-v1
          restore-keys: |
            ${{ runner.os }}-pnpm-vscode-release-

      - name: Download editor extension artifact
        uses: actions/download-artifact@v4
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: Skip publish when VSCE_PAT is absent
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured; skipping VS Code Marketplace publish."

      - name: Publish VS Code extension
        if: env.VSCE_PAT != ''
        run: |
          if [ "${NPM_TAG}" = "latest" ]; then
            vp dlx -p @vscode/vsce@^3.3.2 \
              vsce publish --no-dependencies --packagePath editor-extension-artifacts/vize.vsix
          else
            vp dlx -p @vscode/vsce@^3.3.2 \
              vsce publish --no-dependencies --pre-release --packagePath editor-extension-artifacts/vize.vsix
          fi

  # Build release npm packages once and reuse them across publish jobs
  build-release-packages:
    name: Build release npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install package build dependencies
        run: |
          vp install --frozen-lockfile --prefer-offline \
            --filter './npm/vize...' \
            --filter './npm/vite-plugin-vize...' \
            --filter './npm/oxlint-plugin-vize...' \
            --filter './npm/unplugin-vize...' \
            --filter './npm/fresco...' \
            --filter './npm/musea-mcp-server...' \
            --filter './npm/vite-plugin-musea...' \
            --filter './npm/rspack-vize-plugin...' \
            --filter './npm/musea-nuxt...' \
            --filter './npm/nuxt...'

      - name: Build release npm packages
        run: |
          vp run --filter './npm/vize' build
          vp run --filter './npm/vite-plugin-vize' build
          vp run --filter './npm/oxlint-plugin-vize' build
          vp run --filter './npm/unplugin-vize' build
          vp run --filter './npm/fresco' build
          vp run --filter './npm/musea-mcp-server' build
          vp run --filter './npm/vite-plugin-musea' build
          vp run --filter './npm/vite-plugin-musea' build:gallery
          vp run --filter './npm/rspack-vize-plugin' build
          vp run --filter './npm/musea-nuxt' build
          vp run --filter './npm/nuxt' build

      - name: Upload prebuilt packages
        uses: actions/upload-artifact@v4
        with:
          name: release-npm-packages
          path: |
            npm/vize
            npm/vize-native
            npm/fresco-native
            npm/vite-plugin-vize
            npm/oxlint-plugin-vize
            npm/unplugin-vize
            npm/fresco
            npm/musea-mcp-server
            npm/vite-plugin-musea
            npm/rspack-vize-plugin
            npm/musea-nuxt
            npm/nuxt
          if-no-files-found: error
          compression-level: 0

  # Build native bindings (vize-native + fresco-native) for all platforms
  build-native-all:
    name: Build Native - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            cross_compile: false
          - host: macos-latest
            target: aarch64-apple-darwin
            cross_compile: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cross_compile: false
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cross_compile: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross_compile: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross_compile: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross_compile: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross_compile: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/vize-native...' --filter './npm/fresco-native...'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-native-${{ matrix.settings.target }}
          cache-workspace-crates: "true"

      - name: Setup Zig
        if: matrix.settings.cross_compile
        uses: goto-bus-stop/setup-zig@v2

      - name: Clean native build outputs
        shell: bash
        run: |
          find npm/vize-native -maxdepth 1 -type f -name '*.node' -delete
          find npm/fresco-native -maxdepth 1 -type f -name '*.node' -delete

      - name: Build vize-native
        working-directory: npm/vize-native
        shell: bash
        run: |
          args=(
            build
            --platform
            --release
            --manifest-path ../../crates/vize_vitrine/Cargo.toml
            -p vize_vitrine
            --features napi
            --output-dir .
            --target "${{ matrix.settings.target }}"
          )
          if [[ "${{ matrix.settings.cross_compile }}" == "true" ]]; then
            args+=(--cross-compile)
          fi
          vp exec napi "${args[@]}"

      - name: Collect vize-native artifact
        shell: bash
        run: |
          mkdir -p .artifacts/vize-native
          mapfile -t files < <(find npm/vize-native \
            -path '*/node_modules/*' -prune -o \
            -type f -name '*.node' -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No vize-native .node files found after build." >&2
            find npm/vize-native -path '*/node_modules/*' -prune -o -type f -print | sort >&2
            exit 1
          fi
          printf 'Collected vize-native artifacts:\n'
          printf '  %s\n' "${files[@]}"
          cp "${files[@]}" .artifacts/vize-native/

      - name: Upload vize-native artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .artifacts/vize-native/*.node
          if-no-files-found: error
          compression-level: 0

      - name: Build fresco-native
        working-directory: npm/fresco-native
        shell: bash
        run: |
          args=(
            build
            --platform
            --release
            --manifest-path ../../crates/vize_fresco/Cargo.toml
            -p vize_fresco
            --features napi
            --output-dir .
            --target "${{ matrix.settings.target }}"
          )
          if [[ "${{ matrix.settings.cross_compile }}" == "true" ]]; then
            args+=(--cross-compile)
          fi
          vp exec napi "${args[@]}"

      - name: Collect fresco-native artifact
        shell: bash
        run: |
          mkdir -p .artifacts/fresco-native
          mapfile -t files < <(find npm/fresco-native \
            -path '*/node_modules/*' -prune -o \
            -type f -name '*.node' -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No fresco-native .node files found after build." >&2
            find npm/fresco-native -path '*/node_modules/*' -prune -o -type f -print | sort >&2
            exit 1
          fi
          printf 'Collected fresco-native artifacts:\n'
          printf '  %s\n' "${files[@]}"
          cp "${files[@]}" .artifacts/fresco-native/

      - name: Upload fresco-native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fresco-bindings-${{ matrix.settings.target }}
          path: .artifacts/fresco-native/*.node
          if-no-files-found: error
          compression-level: 0

  # Publish native packages to npm (using Trusted Publishing / OIDC)
  release-npm-native:
    name: Release @vizejs/native to npm
    runs-on: ubuntu-latest
    needs: build-native-all
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/vize-native...'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: npm/vize-native/artifacts

      - name: Create npm platform directories
        working-directory: npm/vize-native
        run: vp exec napi create-npm-dirs

      - name: Move artifacts
        working-directory: npm/vize-native
        run: vp exec napi artifacts --output-dir artifacts

      - name: Prepare for publish
        working-directory: npm/vize-native
        run: vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: List packages
        run: ls -R npm/vize-native/npm/

      - name: Publish platform packages
        working-directory: npm/vize-native
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              cd "$dir"
              publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance || echo "Failed to publish $dir (may need initial manual publish)"
              cd ../..
            fi
          done

      - name: Publish
        working-directory: npm/vize-native
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Publish fresco native packages to npm (using Trusted Publishing / OIDC)
  release-npm-fresco-native:
    name: Release @vizejs/fresco-native to npm
    runs-on: ubuntu-latest
    needs: build-native-all
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/fresco-native...'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fresco-bindings-*
          path: npm/fresco-native/artifacts

      - name: Create npm platform directories
        working-directory: npm/fresco-native
        run: vp exec napi create-npm-dirs

      - name: Move artifacts
        working-directory: npm/fresco-native
        run: vp exec napi artifacts --output-dir artifacts

      - name: Prepare for publish
        working-directory: npm/fresco-native
        run: vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: List packages
        run: ls -R npm/fresco-native/npm/

      - name: Publish platform packages
        working-directory: npm/fresco-native
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              cd "$dir"
              publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance || echo "Failed to publish $dir (may need initial manual publish)"
              cd ../..
            fi
          done

      - name: Publish
        working-directory: npm/fresco-native
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Build and publish WASM package (using Trusted Publishing / OIDC)
  release-npm-wasm:
    name: Release @vizejs/wasm to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm
          cache-workspace-crates: "true"

      - name: Cache WASM package build
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: npm/vize-wasm
          key: ${{ runner.os }}-release-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock', 'npm/vize-wasm/package.json') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          cargo build --release -p vize_vitrine --no-default-features --features wasm --target wasm32-unknown-unknown
          wasm-bindgen target/wasm32-unknown-unknown/release/vize_vitrine.wasm --out-dir npm/vize-wasm --target web
          # Restore the correct package.json (wasm-bindgen overwrites it with crate name)
          git checkout npm/vize-wasm/package.json

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Publish @vizejs/wasm
        working-directory: npm/vize-wasm
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Build and publish Vite plugin (using Trusted Publishing / OIDC)
  release-npm-vite-plugin:
    name: Release @vizejs/vite-plugin to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/vite-plugin
        working-directory: npm/vite-plugin-vize
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Build and publish Oxlint plugin package (using Trusted Publishing / OIDC)
  release-npm-oxlint-plugin:
    name: Release oxlint-plugin-vize to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Inject native binding package versions
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/oxlint-plugin-vize/package.json', 'utf8'));
            const nativePkg = JSON.parse(fs.readFileSync('npm/vize-native/package.json', 'utf8'));
            const version = nativePkg.version;
            if (pkg.optionalDependencies) {
              for (const dep of Object.keys(pkg.optionalDependencies)) {
                if (dep.startsWith('@vizejs/native-')) {
                  pkg.optionalDependencies[dep] = version;
                }
              }
            }
            fs.writeFileSync('npm/oxlint-plugin-vize/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated optionalDependencies to native version ' + version);
          "
          cat npm/oxlint-plugin-vize/package.json

      - name: Publish oxlint-plugin-vize
        working-directory: npm/oxlint-plugin-vize
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Build and publish unplugin package (using Trusted Publishing / OIDC)
  release-npm-unplugin:
    name: Release @vizejs/unplugin to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/unplugin
        working-directory: npm/unplugin-vize
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

  # Build and publish Fresco package (using Trusted Publishing / OIDC)
  release-npm-fresco:
    name: Release @vizejs/fresco to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-fresco-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/fresco
        working-directory: npm/fresco
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance

