name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLISH_RETRY_LIMIT: 6
  PUBLISH_RETRY_DELAY: 10
  PUBLISH_RESOLUTION_RETRY_LIMIT: 24
  PUBLISH_RESOLUTION_RETRY_DELAY: 10
  NPM_TAG: ${{ contains(github.ref_name, '-alpha') && 'alpha' || contains(github.ref_name, '-beta') && 'beta' || contains(github.ref_name, '-rc') && 'rc' || 'latest' }}

jobs:
  # Build CLI binaries for all platforms
  build-cli:
    name: Build CLI - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            archive: vize-x86_64-apple-darwin.tar.gz
          - host: macos-latest
            target: aarch64-apple-darwin
            archive: vize-aarch64-apple-darwin.tar.gz
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            archive: vize-x86_64-pc-windows-msvc.zip
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            archive: vize-aarch64-pc-windows-msvc.zip
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: vize-x86_64-unknown-linux-gnu.tar.gz
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: vize-aarch64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-moonbit

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: moon run --target native - -- < tools/moon/scripts/github/install_cross_compile_tools.mbtx

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-cli-${{ matrix.settings.target }}
          cache-workspace-crates: "true"

      - name: Build CLI
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p vize --target ${{ matrix.settings.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: moon run --target native - -- ${{ matrix.settings.target }} ${{ matrix.settings.archive }} vize < tools/moon/scripts/github/create_cli_archive.mbtx

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: moon run --target native - -- ${{ matrix.settings.target }} ${{ matrix.settings.archive }} vize.exe < tools/moon/scripts/github/create_cli_archive.mbtx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.settings.target }}
          path: ${{ matrix.settings.archive }}
          if-no-files-found: error
          compression-level: 0

  # Package editor extensions for GitHub Releases and registry validation
  build-editor-extensions:
    name: Build Editor Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: vp install --workspace-root --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tools
          cache-workspace-crates: "true"

      - name: Package VS Code extension
        run: vp run --workspace-root package:vscode-extension

      - name: Check Zed extension
        run: vp run --workspace-root check:zed-extension

      - name: Package Zed extension source
        run: vp run --workspace-root package:zed-extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: editor-extensions
          path: |
            npm/vscode-vize/dist/vize.vsix
            zed-vize-extension.tar.gz
          if-no-files-found: error
          compression-level: 0

  # Publish VS Code extension when VSCE_PAT is configured
  release-vscode-extension:
    name: Release VS Code extension
    runs-on: ubuntu-latest
    needs: build-editor-extensions
    environment: vscode-marketplace
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Cache pnpm store for VS Code extension tooling
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-vscode-release-${{ hashFiles('.node-version') }}-v1
          restore-keys: |
            ${{ runner.os }}-pnpm-vscode-release-

      - name: Download editor extension artifact
        uses: actions/download-artifact@v4
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: Skip publish when VSCE_PAT is absent
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured; skipping VS Code Marketplace publish."

      - name: Publish VS Code extension
        if: env.VSCE_PAT != ''
        run: moon run --target native - -- editor-extension-artifacts/vize.vsix < tools/moon/scripts/publish_vscode_extension.mbtx

  # Build release npm packages once and reuse them across publish jobs
  build-release-packages:
    name: Build release npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install package build dependencies
        run: moon run --target native - -- --filter './npm/vize...' --filter './npm/vite-plugin-vize...' --filter './npm/oxlint-plugin-vize...' --filter './npm/unplugin-vize...' --filter './npm/fresco...' --filter './npm/musea-mcp-server...' --filter './npm/vite-plugin-musea...' --filter './npm/rspack-vize-plugin...' --filter './npm/musea-nuxt...' --filter './npm/nuxt...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Build release npm packages
        run: moon run --target native - -- vp run --filter './npm/vize' build -- vp run --filter './npm/vite-plugin-vize' build -- vp run --filter './npm/oxlint-plugin-vize' build -- vp run --filter './npm/unplugin-vize' build -- vp run --filter './npm/fresco' build -- vp run --filter './npm/musea-mcp-server' build -- vp run --filter './npm/vite-plugin-musea' build -- vp run --filter './npm/vite-plugin-musea' build:gallery -- vp run --filter './npm/rspack-vize-plugin' build -- vp run --filter './npm/musea-nuxt' build -- vp run --filter './npm/nuxt' build < tools/moon/scripts/github/run_many.mbtx

      - name: Upload prebuilt packages
        uses: actions/upload-artifact@v4
        with:
          name: release-npm-packages
          path: |
            npm/vize
            npm/vize-native
            npm/fresco-native
            npm/vite-plugin-vize
            npm/oxlint-plugin-vize
            npm/unplugin-vize
            npm/fresco
            npm/musea-mcp-server
            npm/vite-plugin-musea
            npm/rspack-vize-plugin
            npm/musea-nuxt
            npm/nuxt
          if-no-files-found: error
          compression-level: 0

  # Build native bindings (vize-native + fresco-native) for all platforms
  build-native-all:
    name: Build Native - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            cross_compile: false
          - host: macos-latest
            target: aarch64-apple-darwin
            cross_compile: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cross_compile: false
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cross_compile: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross_compile: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross_compile: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross_compile: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross_compile: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/vize-native...' --filter './npm/fresco-native...'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-native-${{ matrix.settings.target }}
          cache-workspace-crates: "true"

      - name: Setup Zig
        if: matrix.settings.cross_compile
        uses: goto-bus-stop/setup-zig@v2

      - name: Clean native build outputs
        shell: bash
        run: moon run --target native - -- npm/vize-native npm/fresco-native < tools/moon/scripts/github/clean_node_binaries.mbtx

      - name: Build vize-native
        shell: bash
        run: moon run --target native - -- npm/vize-native ../../crates/vize_vitrine/Cargo.toml vize_vitrine ${{ matrix.settings.target }} ${{ matrix.settings.cross_compile == true && '--cross-compile' || '' }} < tools/moon/scripts/github/build_napi_package.mbtx

      - name: Collect vize-native artifact
        shell: bash
        run: moon run --target native - -- npm/vize-native .artifacts/vize-native vize-native < tools/moon/scripts/github/collect_native_artifacts.mbtx

      - name: Upload vize-native artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .artifacts/vize-native/*.node
          if-no-files-found: error
          compression-level: 0

      - name: Build fresco-native
        shell: bash
        run: moon run --target native - -- npm/fresco-native ../../crates/vize_fresco/Cargo.toml vize_fresco ${{ matrix.settings.target }} ${{ matrix.settings.cross_compile == true && '--cross-compile' || '' }} < tools/moon/scripts/github/build_napi_package.mbtx

      - name: Collect fresco-native artifact
        shell: bash
        run: moon run --target native - -- npm/fresco-native .artifacts/fresco-native fresco-native < tools/moon/scripts/github/collect_native_artifacts.mbtx

      - name: Upload fresco-native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fresco-bindings-${{ matrix.settings.target }}
          path: .artifacts/fresco-native/*.node
          if-no-files-found: error
          compression-level: 0

  # Publish native packages to npm (using Trusted Publishing / OIDC)
  release-npm-native:
    name: Release @vizejs/native to npm
    runs-on: ubuntu-latest
    needs: build-native-all
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/vize-native...'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: npm/vize-native/artifacts

      - name: Create npm platform directories
        working-directory: npm/vize-native
        run: vp exec napi create-npm-dirs

      - name: Move artifacts
        working-directory: npm/vize-native
        run: vp exec napi artifacts --output-dir artifacts

      - name: Prepare for publish
        working-directory: npm/vize-native
        run: vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: List packages
        run: ls -R npm/vize-native/npm/

      - name: Publish platform packages
        run: moon run --target native - -- npm/vize-native/npm --provenance < tools/moon/scripts/publish_npm_package_dirs.mbtx

      - name: Publish
        run: moon run --target native - -- npm/vize-native --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Publish fresco native packages to npm (using Trusted Publishing / OIDC)
  release-npm-fresco-native:
    name: Release @vizejs/fresco-native to npm
    runs-on: ubuntu-latest
    needs: build-native-all
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/fresco-native...'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fresco-bindings-*
          path: npm/fresco-native/artifacts

      - name: Create npm platform directories
        working-directory: npm/fresco-native
        run: vp exec napi create-npm-dirs

      - name: Move artifacts
        working-directory: npm/fresco-native
        run: vp exec napi artifacts --output-dir artifacts

      - name: Prepare for publish
        working-directory: npm/fresco-native
        run: vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: List packages
        run: ls -R npm/fresco-native/npm/

      - name: Publish platform packages
        run: moon run --target native - -- npm/fresco-native/npm --provenance < tools/moon/scripts/publish_npm_package_dirs.mbtx

      - name: Publish
        run: moon run --target native - -- npm/fresco-native --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish WASM package (using Trusted Publishing / OIDC)
  release-npm-wasm:
    name: Release @vizejs/wasm to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-moonbit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm
          cache-workspace-crates: "true"

      - name: Cache WASM package build
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: npm/vize-wasm
          key: ${{ runner.os }}-release-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock', 'npm/vize-wasm/package.json') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: moon run --target native - -- < tools/moon/scripts/build_vize_wasm_package.mbtx

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Publish @vizejs/wasm
        run: moon run --target native - -- npm/vize-wasm --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Vite plugin (using Trusted Publishing / OIDC)
  release-npm-vite-plugin:
    name: Release @vizejs/vite-plugin to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/vite-plugin
        run: moon run --target native - -- npm/vite-plugin-vize --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Oxlint plugin package (using Trusted Publishing / OIDC)
  release-npm-oxlint-plugin:
    name: Release oxlint-plugin-vize to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Inject native binding package versions
        run: moon run --target native - -- npm/oxlint-plugin-vize/package.json npm/vize-native/package.json --print < tools/moon/scripts/inject_native_optional_deps.mbtx

      - name: Publish oxlint-plugin-vize
        run: moon run --target native - -- npm/oxlint-plugin-vize --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish unplugin package (using Trusted Publishing / OIDC)
  release-npm-unplugin:
    name: Release @vizejs/unplugin to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/unplugin
        run: moon run --target native - -- npm/unplugin-vize --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Fresco package (using Trusted Publishing / OIDC)
  release-npm-fresco:
    name: Release @vizejs/fresco to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-fresco-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/fresco
        run: moon run --target native - -- npm/fresco --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Musea MCP server (using Trusted Publishing / OIDC)
  release-npm-musea-mcp-server:
    name: Release @vizejs/musea-mcp-server to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/musea-mcp-server
        run: moon run --target native - -- npm/musea-mcp-server --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Vite plugin for Musea (using Trusted Publishing / OIDC)
  release-npm-vite-plugin-musea:
    name: Release @vizejs/vite-plugin-musea to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/vite-plugin-musea
        run: moon run --target native - -- npm/vite-plugin-musea --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Rspack plugin (using Trusted Publishing / OIDC)
  release-npm-rspack-plugin:
    name: Release @vizejs/rspack-plugin to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/rspack-plugin
        run: moon run --target native - -- npm/rspack-vize-plugin --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish Musea Nuxt (using Trusted Publishing / OIDC)
  release-npm-musea-nuxt:
    name: Release @vizejs/musea-nuxt to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/musea-nuxt
        run: moon run --target native - -- npm/musea-nuxt --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Build and publish @vizejs/nuxt (using Trusted Publishing / OIDC)
  release-npm-nuxt:
    name: Release @vizejs/nuxt to npm
    runs-on: ubuntu-latest
    needs:
      [
        build-release-packages,
        release-npm-vite-plugin,
        release-npm-vite-plugin-musea,
        release-npm-musea-nuxt,
      ]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Publish @vizejs/nuxt
        run: moon run --target native - -- npm/nuxt --provenance < tools/moon/scripts/publish_npm_package.mbtx

  # Publish crates to crates.io (using Trusted Publishing)
  release-crates:
    name: Release crates to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-moonbit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-crates
          cache-workspace-crates: "true"

      - name: Get crates.io token via Trusted Publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: moon run --target native - -- < tools/moon/scripts/publish_crates.mbtx

  # Create GitHub Release with CLI binaries
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-editor-extensions]
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-artifacts
          merge-multiple: true

      - name: Download editor extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: List CLI artifacts
        run: ls -la cli-artifacts/

      - name: List editor extension artifacts
        run: ls -la editor-extension-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            cli-artifacts/*.tar.gz
            cli-artifacts/*.zip
            editor-extension-artifacts/*.vsix
            editor-extension-artifacts/*.tar.gz

  # Publish vize CLI npm package (using Trusted Publishing / OIDC)
  # Native bindings are distributed via @vizejs/native-* optionalDependencies (NAPI-RS)
  release-npm-cli:
    name: Release vize CLI to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Configure npm auth fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: moon run --target native - -- < tools/moon/scripts/github/configure_npm_auth.mbtx

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Inject native binding package versions
        run: moon run --target native - -- npm/vize/package.json --print < tools/moon/scripts/inject_native_optional_deps.mbtx

      - name: Publish vize CLI package
        run: moon run --target native - -- npm/vize --provenance < tools/moon/scripts/publish_npm_package.mbtx
