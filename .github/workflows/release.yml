  # Publish crates to crates.io (using Trusted Publishing)
  release-crates:
    name: Release crates to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-crates
          cache-workspace-crates: "true"

      - name: Get crates.io token via Trusted Publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: ./scripts/publish-crates.sh

  # Create GitHub Release with CLI binaries
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-editor-extensions]
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-artifacts
          merge-multiple: true

      - name: Download editor extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: List CLI artifacts
        run: ls -la cli-artifacts/

      - name: List editor extension artifacts
        run: ls -la editor-extension-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            cli-artifacts/*.tar.gz
            cli-artifacts/*.zip
            editor-extension-artifacts/*.vsix
            editor-extension-artifacts/*.tar.gz

  # Publish vize CLI npm package (using Trusted Publishing / OIDC)
  # Native bindings are distributed via @vizejs/native-* optionalDependencies (NAPI-RS)
  release-npm-cli:
    name: Release vize CLI to npm
    runs-on: ubuntu-latest
    needs: [build-release-packages, release-npm-native]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Download prebuilt packages
        uses: actions/download-artifact@v4
        with:
          name: release-npm-packages
          path: .

      - name: Inject native binding package versions
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/vize/package.json', 'utf8'));
            const version = pkg.version;
            if (pkg.optionalDependencies) {
              for (const dep of Object.keys(pkg.optionalDependencies)) {
                if (dep.startsWith('@vizejs/native-')) {
                  pkg.optionalDependencies[dep] = version;
                }
              }
            }
            fs.writeFileSync('npm/vize/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated optionalDependencies to ' + version);
          "
          cat npm/vize/package.json

      - name: Publish vize CLI package
        working-directory: npm/vize
        run: |
          publish_with_retry() {
            local max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              echo "Attempt $attempt/$max_attempts: $@"
              if "$@"; then return 0; fi
              if [ $attempt -lt $max_attempts ]; then echo "Retrying in 15s..."; sleep 15; fi
            done
            return 1
          }
          publish_with_retry vp pm publish --access public --no-git-checks --tag $NPM_TAG -- --provenance
