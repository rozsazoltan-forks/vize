name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
      - name: Check flake
        run: nix flake check

  fmt-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format Rust
        run: cargo fmt --all -- --check

  check-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Build vize CLI
        run: cargo build --release -p vize
      - name: Install vize CLI
        run: cp target/release/vize /usr/local/bin/vize
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Test release scripts
        run: vp run --workspace-root test:scripts
      - name: Check editor extensions
        run: vp run --workspace-root check:editor-extensions
      - name: Package editor extensions
        run: vp run --workspace-root package:editor-extensions
      - name: Build JS packages
        run: vp run --workspace-root build:packages
      - name: Check JS/TS
        run: vp run --workspace-root check:ci

  clippy-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/setup-moonbit

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"

      - name: Coverage report
        run: moon run --target native - -- < tools/moon/scripts/github/write_coverage_summary.mbtx

  playground-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      # Rust is always needed for @vizejs/native (used by vite-plugin-vize)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-moonbit

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm"
          cache-workspace-crates: "true"

      - name: Cache WASM build
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: playground/src/wasm
          key: ${{ runner.os }}-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: moon run --target native - -- playground/src/wasm < tools/moon/scripts/github/build_vitrine_wasm.mbtx

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: moon run --target native - -- --filter './playground...' --filter './npm/vite-plugin-vize...' --filter './npm/vize...' --filter './npm/vize-native...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Build npm packages
        run: moon run --target native - -- vp run --filter './npm/vize-native' build -- vp run --filter './npm/vize' build -- vp run --filter './npm/vite-plugin-vize' build < tools/moon/scripts/github/run_many.mbtx

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: moon run --target native - -- < tools/moon/scripts/github/install_playwright_browsers.mbtx

      - name: Run playground tests
        run: vp run --filter './playground' test:browser

      - name: Run VRT
        run: vp run --filter './playground' test:vrt
        continue-on-error: true
        id: vrt

      - name: Update VRT snapshots
        if: steps.vrt.outcome == 'failure'
        run: vp run --filter './playground' test:vrt:update

      - name: Commit updated snapshots
        if: steps.vrt.outcome == 'failure' && github.event_name == 'pull_request'
        run: moon run --target native - -- ${{ github.head_ref }} < tools/moon/scripts/github/commit_vrt_snapshots.mbtx

      - name: Fail if VRT failed and no auto-update
        if: steps.vrt.outcome == 'failure' && github.event_name != 'pull_request'
        run: exit 1

      - name: Upload VRT diff artifacts
        if: steps.vrt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff
          path: playground/e2e/vrt/test-results/
          retention-days: 7
