name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-flake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
      - name: Check flake
        run: nix flake check

  fmt-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Format Rust
        run: cargo fmt --all -- --check

  check-js:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Check JS/TS
        run: vp run --workspace-root check:ci

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Audit production npm dependencies
        run: vp exec pnpm audit --prod --audit-level moderate
      - name: Install cargo-audit
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2
        with:
          tool: cargo-audit
      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  node-engine-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Select Node compatibility version
        run: echo "${{ matrix.node-version }}" > .node-version.ci
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version.ci"
          cache: true
          run-install: false
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Check package engine matrix
        run: node --test tests/tooling/node-engine-matrix.test.ts tests/tooling/package-manifests.test.ts

  check-vize-apps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Build vize CLI
        run: cargo build --profile ci -p vize
      - name: Install vize CLI
        run: cp target/ci/vize /usr/local/bin/vize
      - name: Check Vize app fixtures
        run: vp run --workspace-root check:ci:vize-apps

  test-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Build vize CLI
        run: cargo build --profile ci -p vize
      - name: Install vize CLI
        run: cp target/ci/vize /usr/local/bin/vize
      - name: Test release scripts
        run: vp run --workspace-root test:scripts

  editor-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Check and package editor extensions
        run: vp run --workspace-root package:editor-extensions

  build-js-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Build native package
        run: vp run --filter './npm/vize-native' build:ci
      - name: Build JS packages
        run: vp run --workspace-root build:packages
      - name: Stage shared JS build artifacts
        run: |
          mkdir -p .artifacts/shared-js-build/npm/vize-native
          mkdir -p .artifacts/shared-js-build/npm/vize
          mkdir -p .artifacts/shared-js-build/npm/vite-plugin-vize
          cp npm/vize-native/*.node .artifacts/shared-js-build/npm/vize-native/
          cp npm/vize-native/index.js npm/vize-native/index.d.ts .artifacts/shared-js-build/npm/vize-native/
          cp -R npm/vize/dist .artifacts/shared-js-build/npm/vize/
          cp -R npm/vite-plugin-vize/dist .artifacts/shared-js-build/npm/vite-plugin-vize/
      - name: Upload shared JS build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shared-js-build
          path: .artifacts/shared-js-build/
          if-no-files-found: error
          retention-days: 7

  test-js-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline
      - name: Test JS packages
        run: vp run --workspace-root test:js

  clippy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Install Pkl CLI
        run: npm install --global @pkl-community/pkl@0.27.2
      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: ./.github/actions/setup-moonbit

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "native"
          cache-workspace-crates: "true"

      - name: Coverage report
        run: moon run --target native - -- < tools/moon/scripts/github/write_coverage_summary.mbtx

  playground-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - build-js-packages
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Rust is always needed for @vizejs/native (used by vite-plugin-vize)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-moonbit

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "wasm"
          cache-workspace-crates: "true"

      - name: Cache WASM build
        id: cache-wasm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: playground/src/wasm
          key: ${{ runner.os }}-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2
        with:
          tool: wasm-bindgen-cli@0.2.121

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: moon run --target native - -- playground/src/wasm < tools/moon/scripts/github/build_vitrine_wasm.mbtx

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: moon run --target native - -- --filter './playground...' --filter './npm/vite-plugin-vize...' --filter './npm/vize...' --filter './npm/vize-native...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Download shared JS build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shared-js-build
          path: .

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: moon run --target native - -- < tools/moon/scripts/github/install_playwright_browsers.mbtx

      - name: Run playground tests
        run: vp run --filter './playground' test:browser

      - name: Run VRT
        run: vp run --filter './playground' test:vrt
        continue-on-error: true
        id: vrt

      - name: Upload VRT report
        if: steps.vrt.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playground-vrt-report
          path: playground/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Update VRT snapshots
        if: steps.vrt.outcome == 'failure'
        run: vp run --filter './playground' test:vrt:update

      - name: Fail if VRT failed
        if: steps.vrt.outcome == 'failure'
        run: exit 1

      - name: Upload VRT diff artifacts
        if: steps.vrt.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vrt-diff
          path: playground/e2e/vrt/test-results/
          retention-days: 7

  test-report:
    name: test-report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - nix-flake
      - fmt-rust
      - check-js
      - security-audit
      - node-engine-compat
      - check-vize-apps
      - test-scripts
      - editor-extensions
      - build-js-packages
      - test-js-packages
      - clippy-and-test
      - coverage
      - playground-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Collect test inventory
        run: node bench/test-inventory.mjs --json test-inventory.json --markdown "$GITHUB_STEP_SUMMARY"
      - name: Upload test inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-inventory
          path: test-inventory.json
          retention-days: 14

  test-report-comment:
    name: test-report-comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - test-report
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Download test inventory
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-inventory
      - name: Comment detailed test report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_REPORT_COMMENT_KEY: ${{ github.event.pull_request.head.sha }}
          TEST_REPORT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TEST_REPORT_RUN_ID: ${{ github.run_id }}
          TEST_REPORT_RUN_ATTEMPT: ${{ github.run_attempt }}
          TEST_REPORT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_REPORT_WORKFLOW_NAME: ${{ github.workflow }}
        run: node bench/comment-test-report.mjs --inventory test-inventory.json --summary "$GITHUB_STEP_SUMMARY"
