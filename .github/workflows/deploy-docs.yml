name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "napi"
          cache-workspace-crates: "true"

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install JS dependencies
        run: moon run --target native - -- --filter './docs...' --filter './npm/vite-plugin-vize...' --filter './npm/vize...' --filter './npm/vize-native...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Build @vizejs/vite-plugin
        run: moon run --target native - -- vp run --filter './npm/vize-native' build -- vp run --filter './npm/vize' build -- vp run --filter './npm/vite-plugin-vize' build < tools/moon/scripts/github/run_many.mbtx

      - name: Build docs
        run: vp run --filter './docs' build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/dist

  build-playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "wasm"
          cache-workspace-crates: "true"

      - name: Cache WASM build
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: |
            npm/vize-wasm
            playground/src/wasm
          key: ${{ runner.os }}-docs-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock', 'npm/vize-wasm/package.json') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: moon run --target native - -- npm/vize-wasm playground/src/wasm < tools/moon/scripts/github/build_vitrine_wasm.mbtx

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install JS dependencies
        run: moon run --target native - -- --filter './playground...' --filter './examples/vite-musea...' --filter './npm/vite-plugin-musea...' --filter './npm/vite-plugin-vize...' --filter './npm/vize...' --filter './npm/vize-native...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Build npm packages
        run: moon run --target native - -- vp run --filter './npm/vize-native' build -- vp run --filter './npm/vize' build -- vp run --filter './npm/vite-plugin-vize' build -- vp run --filter './npm/vite-plugin-musea' build < tools/moon/scripts/github/run_many.mbtx

      - name: Build playground
        run: vp run --filter './playground' build

      - name: Build musea-examples
        run: vp run --filter './examples/vite-musea' build

      - name: Upload playground artifact
        uses: actions/upload-artifact@v4
        with:
          name: playground
          path: playground/dist

      - name: Upload musea-examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: musea-examples
          path: examples/vite-musea/dist

  deploy:
    runs-on: ubuntu-latest
    needs: [build-docs, build-playground]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: playground/public/CNAME
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create site structure
        run: moon run --target native - -- < tools/moon/scripts/github/create_site_structure.mbtx

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
